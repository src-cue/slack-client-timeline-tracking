name: Daily Deliverables Screenshots

on:
  schedule:
    - cron: '0 5 * * 1-5'    # 10:30 AM IST (UTC+5:30), Mon–Fri
  workflow_dispatch:           # allow manual trigger from GitHub UI

jobs:
  post-deliverables:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            poppler-utils \
            fonts-liberation \
            fonts-dejavu-core

      - name: Install Python dependencies
        run: pip install weasyprint pdf2image Pillow requests

      - name: Render and upload to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: python scripts/render_and_upload.py
